<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">

        <style>
        :root {
            --brand-red: #c32026;
            --brand-red-dark: #8f161c;
            --brand-red-soft: #f6d9db;
            --brand-ink: #22252b;
            --brand-muted: #5f6672;
            --brand-surface: rgba(255, 255, 255, 0.94);
            --brand-surface-warm: rgba(252, 247, 247, 0.95);
            --brand-border: rgba(195, 32, 38, 0.16);
            --brand-white: #ffffff;
        }
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        .leaflet-popup-content-wrapper {
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }
        .info,
        .abstractUncollapsed,
        .leaflet-control-layers {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .info {
            min-width: 280px;
            padding: 14px 16px 12px;
            border: 1px solid var(--brand-border);
            border-radius: 16px;
            background: var(--brand-surface-warm);
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.22);
        }
        .map-title__kicker {
            margin: 0 0 4px;
            font: 700 11px/1.2 "Segoe UI", Tahoma, sans-serif;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--brand-red);
        }
        .map-title__heading {
            margin: 0;
            font: 800 30px/1 "Segoe UI", Tahoma, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--brand-ink);
        }
        .map-title__subtext {
            margin: 6px 0 0;
            font: 600 12px/1.4 "Segoe UI", Tahoma, sans-serif;
            color: var(--brand-muted);
        }
        .abstractUncollapsed {
            margin-top: 10px;
            max-width: 280px;
            padding: 14px 16px;
            border: 1px solid var(--brand-border);
            border-radius: 16px;
            background: var(--brand-surface) !important;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
            font: 500 13px/1.6 "Segoe UI", Tahoma, sans-serif;
            color: var(--brand-muted) !important;
        }
        .abstractUncollapsed strong {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--brand-red);
        }
        .project-notice {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(34, 37, 43, 0.34);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .project-notice[hidden] {
            display: none;
        }
        .project-notice__card {
            width: min(460px, 92vw);
            padding: 24px 24px 20px;
            border-radius: 22px;
            border: 1px solid var(--brand-border);
            background: var(--brand-surface);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
        }
        .project-notice__eyebrow {
            margin: 0 0 8px;
            font: 800 11px/1 "Segoe UI", Tahoma, sans-serif;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--brand-red);
        }
        .project-notice__title {
            margin: 0 0 10px;
            font: 800 28px/1.05 "Segoe UI", Tahoma, sans-serif;
            color: var(--brand-ink);
        }
        .project-notice__text {
            margin: 0;
            font: 500 15px/1.7 "Segoe UI", Tahoma, sans-serif;
            color: var(--brand-muted);
        }
        .project-notice__actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
        }
        .project-notice__button {
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            background: var(--brand-red);
            color: var(--brand-white);
            font: 700 14px/1 "Segoe UI", Tahoma, sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(195, 32, 38, 0.2);
        }
        .project-notice__button:hover {
            background: var(--brand-red-dark);
        }
        .leaflet-control-layers {
            min-width: 250px;
            padding: 12px;
            border: 1px solid var(--brand-border);
            border-radius: 22px;
            background: var(--brand-surface) !important;
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.18) !important;
            display: block;
        }
        .leaflet-control-layers-expanded {
            padding-left: 12px;
            padding-right: 12px;
        }
        .leaflet-control-layers-list {
            width: 100%;
            margin-top: 10px;
        }
        .leaflet-control-layers-group-title {
            margin: 12px 2px 6px;
            font: 800 11px/1 "Segoe UI", Tahoma, sans-serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }
        .leaflet-control-layers-group-title:first-child {
            margin-top: 0;
        }
        .leaflet-control-layers-selector {
            accent-color: var(--brand-red);
            width: 15px;
            height: 15px;
            margin: 0;
        }
        .leaflet-control-layers label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
            padding: 8px 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.72);
            font: 600 14px/1.4 "Segoe UI", Tahoma, sans-serif;
            color: var(--brand-ink);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .leaflet-control-layers label:hover {
            background: rgba(246, 217, 219, 0.36);
            transform: translateY(-1px);
        }
        .layer-entry {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .layer-entry__symbol {
            flex: 0 0 auto;
            position: relative;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: none;
            background: #b7b1b3;
            box-shadow: 0 6px 12px rgba(34, 37, 43, 0.22);
        }
        .layer-entry__symbol::after {
            position: absolute;
            inset: 3px;
            display: block;
            background: center / contain no-repeat url("images/museo.png");
        }
        .layer-entry__symbol--base {
            border-radius: 5px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background:
                linear-gradient(135deg, #ffffff, #f3f4f6),
                linear-gradient(45deg, #d1d5db 25%, #f8fafc 25% 50%, #d1d5db 50% 75%, #f8fafc 75%);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
        }
        .layer-entry__symbol--base::after {
            display: none;
        }
        .layer-entry__symbol--satellite {
            border-radius: 5px;
            border: 1px solid rgba(30, 41, 59, 0.18);
            background:
                linear-gradient(135deg, rgba(14, 116, 144, 0.95), rgba(59, 130, 246, 0.5)),
                linear-gradient(45deg, #d6d3d1 25%, #b91c1c 25% 50%, #1d4ed8 50% 75%, #14532d 75%);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
        }
        .layer-entry__symbol--satellite::after {
            display: none;
        }
        .leaflet-control-layers-toggle::after {
            font-weight: 800;
            color: var(--brand-muted);
        }
        .leaflet-control-layers-expanded .leaflet-control-layers-toggle {
            width: 30px;
            height: 30px;
            margin-bottom: 0;
            margin-left: auto;
            border-radius: 999px;
            background: rgba(195, 32, 38, 0.08);
        }
        .leaflet-control-layers-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(195, 32, 38, 0.12);
        }
        .leaflet-control-layers-title {
            font: 800 12px/1 "Segoe UI", Tahoma, sans-serif;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--brand-red);
        }
        .leaflet-marker-icon {
            filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.25));
        }
        .museum-marker {
            position: relative;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(180deg, #c6c1c2 0%, #a8a1a3 100%);
            box-shadow: 0 8px 18px rgba(34, 37, 43, 0.28);
        }
        .museum-marker::before {
            content: "";
            position: absolute;
            inset: 7px;
            display: block;
            background: center / contain no-repeat url("images/museo.png");
        }
        .museum-marker__icon {
            display: none;
        }
        .marker-cluster-small,
        .marker-cluster-medium,
        .marker-cluster-large {
            background: transparent;
            border: none;
        }
        .marker-cluster-small div,
        .marker-cluster-medium div,
        .marker-cluster-large div {
            width: 34px;
            height: 34px;
            margin-left: 0;
            margin-top: 0;
            border-radius: 999px;
            background: #56504f;
            color: var(--brand-white);
            font: 700 13px/34px "Segoe UI", Tahoma, sans-serif;
            box-shadow: 0 6px 14px rgba(34, 37, 43, 0.16);
        }
        .marker-cluster {
            width: 34px !important;
            height: 34px !important;
            border-radius: 999px;
            background-clip: padding-box;
        }
        .marker-cluster span {
            line-height: 34px;
        }
        .leaflet-popup-content {
            margin: 0;
            min-width: 280px;
        }
        .museum-popup {
            width: min(420px, 78vw);
            color: var(--brand-ink);
            font-family: "Segoe UI", Tahoma, sans-serif;
        }
        .museum-popup__header {
            padding: 18px 20px 10px;
            border-bottom: 1px solid #e5e7eb;
            background: linear-gradient(135deg, #fff4f4 0%, #ffffff 100%);
        }
        .museum-popup__eyebrow {
            margin: 0 0 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--brand-red);
        }
        .museum-popup__title {
            margin: 0;
            font-size: 20px;
            line-height: 1.2;
            font-weight: 700;
            color: var(--brand-ink);
        }
        .museum-popup__body {
            padding: 16px 20px 20px;
        }
        .museum-popup__grid {
            display: grid;
            gap: 10px;
        }
        .museum-popup__item {
            padding: 10px 12px;
            border-radius: 12px;
            background: #fbfbfc;
            border: 1px solid rgba(195, 32, 38, 0.1);
        }
        .museum-popup__label {
            display: block;
            margin-bottom: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }
        .museum-popup__value {
            font-size: 14px;
            line-height: 1.5;
            color: var(--brand-ink);
            word-break: break-word;
        }
        .museum-popup__gallery {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        .museum-popup__photo {
            overflow: hidden;
            border-radius: 14px;
            background: #f8f4f4;
            border: 1px solid rgba(195, 32, 38, 0.12);
        }
        .museum-popup__photo img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }
        @media (max-width: 640px) {
            .info {
                min-width: 220px;
                padding: 12px 14px;
            }
            .map-title__heading {
                font-size: 22px;
            }
            .map-title__subtext {
                font-size: 11px;
            }
            .project-notice__card {
                padding: 20px 18px 18px;
            }
            .project-notice__title {
                font-size: 24px;
            }
            .project-notice__text {
                font-size: 14px;
            }
            .museum-popup {
                width: min(320px, 82vw);
            }
            .museum-popup__header,
            .museum-popup__body {
                padding-left: 16px;
                padding-right: 16px;
            }
            .leaflet-control-layers {
                min-width: 200px;
            }
        }
        </style>
        <title>MUSEOS EN EL CASCO VIEJO</title>
    </head>
    <body>
        <div class="project-notice" id="project-notice">
            <div class="project-notice__card" role="dialog" aria-modal="true" aria-labelledby="project-notice-title">
                <p class="project-notice__eyebrow">Aviso</p>
                <h2 class="project-notice__title" id="project-notice-title">Proyecto en construcción</h2>
                <p class="project-notice__text">Este mapa forma parte de un proyecto académico en desarrollo. Algunos contenidos, ubicaciones y descripciones pueden seguir en revisión o actualización.</p>
                <div class="project-notice__actions">
                    <button class="project-notice__button" id="project-notice-close" type="button">Entendido</button>
                </div>
            </div>
        </div>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="js/leaflet.markercluster.js"></script>
        <script src="data/museos_1.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-17.78571070848532,-63.18493868526275],[-17.7813691797189,-63.1782497967628]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        function formatPopupValue(value) {
            return autolinker.link(escapeHtml(String(value).toLocaleString()));
        }
        function buildPopupItem(label, value) {
            if (value === null || value === undefined || value === '') {
                return '';
            }
            return '<div class="museum-popup__item">' +
                '<span class="museum-popup__label">' + escapeHtml(label) + '</span>' +
                '<div class="museum-popup__value">' + formatPopupValue(value) + '</div>' +
                '</div>';
        }
        function buildPopupImage(fileName, altText) {
            if (fileName === null || fileName === undefined || String(fileName).trim() === '') {
                return '';
            }
            var safeName = String(fileName).replace(/[\\/:]/g, '_').trim().replace(/'/g, '\'').replace(/"/g, '&quot;');
            return '<figure class="museum-popup__photo">' +
                '<img src="images/' + safeName + '" alt="' + escapeHtml(altText) + '">' +
                '</figure>';
        }
        function createMuseumMarkerIcon() {
            return L.divIcon({
                className: 'museum-marker-wrapper',
                html: '<div class="museum-marker"><i class="fas fa-university museum-marker__icon"></i></div>',
                iconSize: [34, 34],
                iconAnchor: [17, 17],
                popupAnchor: [0, -16]
            });
        }
        var title = new L.Control({'position':'topright'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<p class="map-title__kicker">UNIFRANZ</p>' +
                '<h2 class="map-title__heading">Museos en el Casco Viejo</h2>' +
                '<p class="map-title__subtext">Proyecto acad\u00e9mico | Santa Cruz de la Sierra, Bolivia</p>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'topright'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'

                abstract.show();
                return this._div;
            };
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'Datos levantados por los estudianes de rutas y mapas digitales. En construcción...';
        };
        abstract.addTo(map);
        abstract.show = function () {
            this._div.classList.remove("abstract");
            this._div.classList.add("abstractUncollapsed");
            this._div.innerHTML = '<strong>Contexto</strong>Datos levantados por estudiantes de rutas y mapas digitales. Proyecto en construcci\u00f3n.';
        };
        document.getElementById('abstract').innerHTML = '<strong>Contexto</strong>Datos levantados por estudiantes de rutas y mapas digitales. Proyecto en construcci\u00f3n.';
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_MapaClaro_0');
        map.getPane('pane_MapaClaro_0').style.zIndex = 399;
        var layer_MapaClaro_0 = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            pane: 'pane_MapaClaro_0',
            opacity: 1.0,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            minZoom: 1,
            maxZoom: 28,
            subdomains: 'abcd'
        });
        layer_MapaClaro_0;
        map.addLayer(layer_MapaClaro_0);
        function pop_museos_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Museos</th>\
                        <td>' + (feature.properties['nombre_del'] !== null ? autolinker.link(String(feature.properties['nombre_del']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Tipo</th>\
                        <td>' + (feature.properties['tipo_de_mu'] !== null ? autolinker.link(String(feature.properties['tipo_de_mu']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Material</th>\
                        <td>' + (feature.properties['material_d'] !== null ? autolinker.link(String(feature.properties['material_d']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Público</th>\
                        <td>' + (feature.properties['tipo_de_p_'] !== null ? autolinker.link(String(feature.properties['tipo_de_p_']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Concurrencia</th>\
                        <td>' + (feature.properties['que_tan_co'] !== null ? autolinker.link(String(feature.properties['que_tan_co']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Municipio</th>\
                        <td>' + (feature.properties['municipio_'] !== null ? autolinker.link(String(feature.properties['municipio_']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\

		document.addEventListener("DOMContentLoaded", function() {
            var projectNotice = document.getElementById('project-notice');
            var projectNoticeClose = document.getElementById('project-notice-close');
            if (projectNotice && projectNoticeClose) {
                projectNoticeClose.addEventListener('click', function() {
                    projectNotice.hidden = true;
                });
            }
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            if (controlLayersElement && toggleLayerControl && !controlLayersElement.querySelector('.leaflet-control-layers-header')) {
                var header = document.createElement('div');
                header.className = 'leaflet-control-layers-header';
                var title = document.createElement('div');
                title.className = 'leaflet-control-layers-title';
                title.textContent = 'Leyenda';
                toggleLayerControl.parentNode.insertBefore(header, toggleLayerControl);
                header.appendChild(title);
                header.appendChild(toggleLayerControl);
            }
            function decorateLayerSections() {
                var layersListElement = document.querySelector('.leaflet-control-layers-list');
                if (!layersListElement) {
                    return;
                }
                Array.from(layersListElement.querySelectorAll('.leaflet-control-layers-group-title')).forEach(function(node) {
                    node.remove();
                });
                var labels = Array.from(layersListElement.querySelectorAll('label'));
                var overlayLabels = [];
                var baseLabels = [];
                labels.forEach(function(label) {
                    var input = label.querySelector('input');
                    if (!input) {
                        return;
                    }
                    if (input.type === 'checkbox') {
                        overlayLabels.push(label);
                    } else if (input.type === 'radio') {
                        baseLabels.push(label);
                    }
                });
                layersListElement.innerHTML = '';
                if (overlayLabels.length) {
                    var overlayTitle = document.createElement('div');
                    overlayTitle.className = 'leaflet-control-layers-group-title';
                    overlayTitle.textContent = 'Capa';
                    layersListElement.appendChild(overlayTitle);
                    overlayLabels.forEach(function(label) {
                        layersListElement.appendChild(label);
                    });
                }
                if (baseLabels.length) {
                    var baseTitle = document.createElement('div');
                    baseTitle.className = 'leaflet-control-layers-group-title';
                    baseTitle.textContent = 'Mapa base';
                    layersListElement.appendChild(baseTitle);
                    baseLabels.forEach(function(label) {
                        layersListElement.appendChild(label);
                    });
                }
            }
            decorateLayerSections();
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            controlLayersElement = document.querySelector('.leaflet-control-layers');
            toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                decorateLayerSections();
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
                        decorateLayerSections();
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();
        </script>
